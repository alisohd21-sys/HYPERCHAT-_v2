<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperChat Blue Pro</title>
    <style>
        :root {
            --primary: #0052cc;
            --bg: #f4f7fa;
            --side: #ffffff;
            --text: #172b4d;
            --bubble-me: #0052cc;
            --bubble-other: #ebecf0;
            --border: #dfe1e6;
        }

        [data-theme="dark"] {
            --bg: #070d19;
            --side: #101928;
            --text: #f4f7fa;
            --bubble-me: #2684ff;
            --bubble-other: #1c2b41;
            --border: #2c3e50;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* حل مشكلة الطول في الهاتف */
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; /* Dynamic Viewport Height */
            width: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden; 
        }

        /* شاشة الدخول */
        #login-page { 
            position: fixed; inset: 0; background: var(--primary); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; 
        }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* التصميم الرئيسي بنظام Flex */
        .main-wrapper { display: flex; width: 100%; height: 100dvh; }

        /* القائمة الجانبية (الجوال) */
        .sidebar { 
            width: 300px; background: var(--side); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; height: 100%;
            transition: transform 0.3s ease; position: relative; z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; right: 0; transform: translateX(100%); width: 80%; }
            .sidebar.active { transform: translateX(0); box-shadow: -10px 0 30px rgba(0,0,0,0.2); }
        }

        /* منطقة الدردشة - أهم جزء */
        .chat-container { 
            flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; 
        }

        .header { 
            height: 60px; background: var(--side); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 15px; justify-content: space-between;
            flex-shrink: 0;
        }

        .sections-bar { 
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; 
            background: var(--side); border-bottom: 1px solid var(--border);
            flex-shrink: 0; scrollbar-width: none;
        }
        .section-tag { 
            padding: 6px 16px; border-radius: 20px; background: var(--bg); 
            font-size: 13px; cursor: pointer; border: 1px solid var(--border); white-space: nowrap;
        }
        .section-tag.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* منطقة الرسائل - تأخذ كل المساحة المتاحة */
        #messages-list { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            background-color: var(--bg);
        }

        .bubble { 
            max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px;
            line-height: 1.4; position: relative; word-wrap: break-word;
        }
        .bubble.me { align-self: flex-end; background: var(--bubble-me); color: white; border-bottom-left-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--bubble-other); color: var(--text); border-bottom-right-radius: 4px; }

        /* صندوق الإرسال - ثابت في الأسفل تماماً */
        .footer-input { 
            padding: 10px 15px; background: var(--side); border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        .footer-input input { 
            flex: 1; border: none; padding: 14px 18px; border-radius: 25px; 
            background: var(--bg); color: var(--text); outline: none; font-size: 16px;
        }
        .send-circle { 
            background: var(--primary); color: white; border: none; width: 48px; height: 48px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900; }
        .overlay.active { display: block; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h2 style="color:var(--primary)">HyperChat Pro</h2>
            <p>سجل دخولك للبدء</p>
            <button onclick="login()" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; background:white; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                متابعة باستخدام Google
            </button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="header">
                <img id="user-avatar" src="" style="width:35px; height:35px; border-radius:50%; border:2px solid var(--primary)">
                <div style="display:flex; gap:10px;">
                    <button onclick="toggleTheme()" style="background:none; border:none; font-size:20px; cursor:pointer;">🌓</button>
                    <button onclick="createNewGroup()" style="background:none; border:none; font-size:20px; cursor:pointer;">➕</button>
                </div>
            </div>
            <div style="padding:15px; border-bottom:1px solid var(--border)">
                <input type="text" id="join-code" placeholder="كود الانضمام..." style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text)">
                <button onclick="joinGroup()" style="width:100%; margin-top:8px; padding:10px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">انضمام</button>
            </div>
            <div id="groups-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
        </aside>

        <main class="chat-container">
            <header class="header">
                <button onclick="toggleSidebar()" style="background:none; border:none; font-size:26px; color:var(--primary);">☰</button>
                <b id="active-title">HyperChat</b>
                <button id="add-sec-btn" class="hidden" onclick="addSection()" style="background:var(--primary); color:white; border:none; padding:6px 12px; border-radius:8px; font-size:12px;">+ قسم</button>
            </header>

            <div id="sections-nav" class="sections-bar hidden"></div>

            <div id="messages-list">
                <div style="text-align:center; margin-top:100px; opacity:0.5">اختر مجموعة من القائمة للبدء</div>
            </div>

            <footer class="footer-input hidden" id="input-area">
                <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
                <button class="send-circle" onclick="sendMessage()">➤</button>
            </footer>
        </main>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, orderBy, doc, updateDoc, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBW1lS6QkWv4XKjswEykFcHlttlxZc5NHU",
        authDomain: "hyperchat-ff63f.firebaseapp.com",
        projectId: "hyperchat-ff63f",
        storageBucket: "hyperchat-ff63f.firebasestorage.app",
        messagingSenderId: "1024781406095",
        appId: "1:1024781406095:web:589ac28cafd2826f2f05fa",
        measurementId: "G-VNSFFCT36P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let user = null;
    let currentGroupId = null;
    let currentSection = "عام";

    window.login = () => signInWithPopup(auth, new GoogleAuthProvider());

    onAuthStateChanged(auth, (u) => {
        if (u) {
            user = u;
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('user-avatar').src = u.photoURL;
            loadGroups();
        }
    });

    window.toggleTheme = () => {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    };

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    };

    window.createNewGroup = async () => {
        const name = prompt("اسم المجموعة:");
        if(!name) return;
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        await addDoc(collection(db, "groups"), {
            name, admin: user.uid, members: [user.uid], sections: ["عام"], inviteCode: code, createdAt: serverTimestamp()
        });
        alert("تم إنشاء المجموعة! كود الانضمام: " + code);
    };

    window.joinGroup = async () => {
        const code = document.getElementById('join-code').value.trim().toUpperCase();
        const q = query(collection(db, "groups"), where("inviteCode", "==", code));
        const snap = await getDocs(q);
        if(snap.empty) return alert("الكود غير صحيح");
        snap.forEach(async (d) => {
            await updateDoc(doc(db, "groups", d.id), { members: arrayUnion(user.uid) });
            alert("تم الانضمام!");
            document.getElementById('join-code').value = "";
        });
    };

    function loadGroups() {
        const q = query(collection(db, "groups"), where("members", "array-contains", user.uid));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('groups-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const g = d.data();
                const div = document.createElement('div');
                div.style = `padding:15px; margin-bottom:10px; border-radius:15px; cursor:pointer; background:${currentGroupId === d.id ? 'var(--primary)' : 'var(--side)'}; color:${currentGroupId === d.id ? 'white' : 'var(--text)'}; border:1px solid var(--border)`;
                div.innerHTML = `<b>${g.name}</b><br><small>Code: ${g.inviteCode}</small>`;
                div.onclick = () => selectGroup(d.id, g);
                list.appendChild(div);
            });
        });
    }

    function selectGroup(id, g) {
        currentGroupId = id;
        currentSection = "عام";
        document.getElementById('active-title').innerText = g.name;
        document.getElementById('input-area').classList.remove('hidden');
        document.getElementById('add-sec-btn').classList.toggle('hidden', g.admin !== user.uid);
        
        const nav = document.getElementById('sections-nav');
        nav.classList.remove('hidden');
        nav.innerHTML = "";
        g.sections.forEach(s => {
            const tag = document.createElement('div');
            tag.className = `section-tag ${currentSection === s ? 'active' : ''}`;
            tag.innerText = s;
            tag.onclick = () => { currentSection = s; selectGroup(id, g); };
            nav.appendChild(tag);
        });

        loadMessages();
        if(window.innerWidth < 768) toggleSidebar();
    }

    window.addSection = async () => {
        const name = prompt("اسم القسم الجديد:");
        if(name) await updateDoc(doc(db, "groups", currentGroupId), { sections: arrayUnion(name) });
    };

    let msgUnsub = null;
    function loadMessages() {
        if(msgUnsub) msgUnsub();
        const q = query(collection(db, "messages"), where("groupId", "==", currentGroupId), where("section", "==", currentSection), orderBy("timestamp", "asc"));
        
        msgUnsub = onSnapshot(q, (snap) => {
            const view = document.getElementById('messages-list');
            view.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `bubble ${m.senderId === user.uid ? 'me' : 'other'}`;
                div.innerText = m.text;
                view.appendChild(div);
            });
            view.scrollTop = view.scrollHeight;
        }, (error) => {
            if(error.code === 'failed-precondition') {
                alert("يجب تفعيل 'الفهرسة' في Firebase Console. افتح الكونسول (F12) واضغط على الرابط.");
            }
        });
    }

    window.sendMessage = async () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value || !currentGroupId) return;
        const text = inp.value;
        inp.value = "";
        await addDoc(collection(db, "messages"), {
            groupId: currentGroupId, section: currentSection, senderId: user.uid, text: text, timestamp: serverTimestamp()
        });
    };

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
